name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  commit-lint:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Validate conventional commits with scope
        run: |
          git log --format='%s' origin/main..HEAD | while IFS= read -r msg; do
            echo "$msg" | grep -qE '^Merge ' && continue
            if ! echo "$msg" | grep -qE '^(feat|fix|docs|refactor|test|chore|ci|perf|style|build|revert)\([^)]+\): '; then
              echo "❌ Each commit must use format: type(scope): description"
              echo "   Example: feat(api): add pagination to list endpoint"
              echo "   Got:     $msg"
              exit 1
            fi
          done

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - name: go vet
        run: go vet ./...

      - name: go mod tidy check
        run: |
          go mod tidy
          if ! test -z "$(git status --porcelain)"; then
            echo "Please run 'go mod tidy' before committing"
            git diff --exit-code
          fi

      - name: Check ThirdPartyNotices.txt is up to date
        run: |
          bash .github/scripts/generate-third-party.sh
          if ! git diff --exit-code ThirdPartyNotices.txt; then
            echo "❌ ThirdPartyNotices.txt is out of date. Run 'make third-party' and commit the result."
            exit 1
          fi

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: |
          go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.txt
          flags: unittests
          name: sdk-ops-codecov
          fail_ci_if_error: false

  release:
    name: Release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine version
        id: version
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
          if [ "$LATEST" = "v0.0.0" ]; then
            TAG="v0.0.1"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "First release: $TAG"
            exit 0
          fi
          COMMITS=$(git log "$LATEST..HEAD" --format="%s%b" 2>/dev/null || true)
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits since $LATEST — skipping release"
            exit 0
          fi
          if echo "$COMMITS" | grep -qE '^.*?\([^)]*\)?!:|^BREAKING[ -]CHANGE:'; then
            TAG="v$((MAJOR+1)).0.0"
          elif echo "$COMMITS" | grep -q '^feat'; then
            TAG="v$MAJOR.$((MINOR+1)).0"
          elif echo "$COMMITS" | grep -qE '^fix|^perf'; then
            TAG="v$MAJOR.$MINOR.$((PATCH+1))"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No functional changes — skipping release"
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing: $TAG"

      - name: Tag and push
        if: steps.version.outputs.skip != 'true'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Run GoReleaser
        if: steps.version.outputs.skip != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


