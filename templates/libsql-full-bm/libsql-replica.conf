# libSQL Replica configuration (libsql-full-bm)
# Reference: Flags passed to sqld in docker-compose.yml

# === Node type ===
# SQLD_NODE=replica

# === Primary connection ===
# SQLD_PRIMARY_URL=https://sqld-primary:5001

# === Listen addresses ===
# HTTP:  SQLD_HTTP_LISTEN_ADDR=0.0.0.0:8080

# === TLS for gRPC (replica -> primary) ===
# --primary-grpc-tls
# --primary-grpc-ca-cert-file=/tls/ca_cert.pem
# --primary-grpc-cert-file=/tls/client_cert.pem
# --primary-grpc-key-file=/tls/client_key.pem

# === Client authentication (optional) ===
# --auth-jwt-key-file=/etc/tls/jwt_key.pem
