name: libsql-full-bm
description: libSQL (sqld) primary + replica + HAProxy TLS + WAL snapshots
services:
  - sqld-primary (libSQL HTTP server :8080, gRPC :5001)
  - sqld-replica (libSQL replica HTTP :8081)
  - haproxy (TLS termination :8443 primary, :8444 replica)
  - minio (optional S3-compatible storage via --profile s3)
ports:
  - "8080:8080"    # Primary HTTP (plain)
  - "8443:8443"    # Primary HTTP (TLS via HAProxy)
  - "8081:8080"    # Replica HTTP (plain)
  - "8444:8444"    # Replica HTTP (TLS via HAProxy)
env:
  LIBSQL_DB: libsql.db
health:
  path: /health
  interval: 15
commands:
  init: bash init.sh
  backup: bash backup.sh
  restore: bash restore.sh [-y|--yes] <backup>
  validate: bash validate.sh
