# pg-full-bm PostgreSQL reference config
# Applied via docker-compose.yml command: flags
# This file is for reference only — actual config is set in docker-compose.yml

# Connections
# max_connections = 200              # set via -c flag in compose
# listen_addresses = '*'             # default in container
# port = 5432                        # default

# SSL
# ssl = on                           # set via -c flag
# ssl_cert_file = /ssl/server.crt
# ssl_key_file = /ssl/server.key

# WAL
# wal_level = replica                # for pgbackrest archiving
# archive_mode = on
# archive_command = 'pgbackrest --stanza=main archive-push %p'
# archive_timeout = 60

# Replication
# max_wal_senders = 10               # default
# max_replication_slots = 10         # default
# hot_standby = on                   # default in PG 18

# PgDog expects these
# ssl = on
# ssl_cert_file = /ssl/server.crt
# ssl_key_file = /ssl/server.key

# PgBouncer-style auth
# password_encryption = scram-sha-256  # default
