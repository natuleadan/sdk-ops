name: pg-full-bm
services:
  pgdog:
    image: ghcr.io/pgdogdev/pgdog:main
    ports:
      - "${PGDOG_PORT:-6432}:6432"
    volumes:
      - ./pgdog.toml:/pgdog/pgdog.toml:ro
      - ./users.toml:/pgdog/users.toml:ro
      - ./ssl:/ssl:ro
    depends_on:
      postgres:
        condition: service_healthy
      pg-replica:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default

  postgres:
    image: postgres:18-alpine
    entrypoint: ["/usr/local/bin/pg-entrypoint.sh"]
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/ssl/server.crt
      - -c
      - ssl_key_file=/ssl/server.key
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_command=pgbackrest --stanza=main archive-push %p
      - -c
      - archive_timeout=60
    environment:
      POSTGRES_USER: ${PG_USER:-dev}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-devpass}
      POSTGRES_DB: ${PG_DATABASE:-postgres}
      PGDATA: /var/lib/postgresql/18/docker
      PGPASSWORD: ${PG_PASSWORD:-devpass}
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-dev}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    volumes:
      - ./data/pg:/var/lib/postgresql
      - ./data/pgbackrest:/var/lib/pgbackrest
      - ./ssl:/ssl:ro
      - ./pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - ./pg-entrypoint.sh:/usr/local/bin/pg-entrypoint.sh:ro
    networks:
      - default

  pg-replica:
    image: postgres:18-alpine
    entrypoint: ["/usr/local/bin/pg-replica-entrypoint.sh"]
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/ssl/server.crt
      - -c
      - ssl_key_file=/ssl/server.key
      - -c
      - hot_standby=on
    environment:
      POSTGRES_USER: ${PG_USER:-dev}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-devpass}
      POSTGRES_DB: ${PG_DATABASE:-postgres}
      PGDATA: /var/lib/postgresql/18/docker
      PGPASSWORD: ${PG_PASSWORD:-devpass}
      PRIMARY_HOST: postgres
      PRIMARY_PORT: 5432
      REPLICATOR_PASSWORD: ${REPLICATOR_PASSWORD:-replicatorpass}
    ports:
      - "${PG_REPLICA_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-dev} -h localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/pg-replica:/var/lib/postgresql
      - ./ssl:/ssl:ro
      - ./pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - ./pg-replica-entrypoint.sh:/usr/local/bin/pg-replica-entrypoint.sh:ro
    networks:
      - default

  minio:
    image: minio/minio:latest
    profiles:
      - s3
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - minio_data:/data
    networks:
      - default

  createbucket:
    image: minio/mc:latest
    profiles:
      - s3
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${S3_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-pg-backups}
    entrypoint: >
      sh -c "
      mc alias set s3 http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb s3/$${S3_BUCKET} --ignore-existing
      "
    networks:
      - default

volumes:
  minio_data:
