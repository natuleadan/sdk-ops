[pgbackrest]
compress-type=gz
compress-level=3
process-max=2
start-fast=y
buffer-path=/tmp

[main]
pg1-path=/var/lib/postgresql/18/docker
pg1-port=5432
pg1-user=dev

# Storage — set via init.sh
# Local (default) stores under /var/lib/pgbackrest
# S3-compatible: set S3_ENDPOINT, S3_BUCKET, S3_KEY, S3_SECRET before init.sh

repo1-path=/var/lib/pgbackrest
repo1-retention-full=2
repo1-retention-diff=4
repo1-cipher-type=none
