# Dragonfly Primary Configuration (kv-full-bm)
# Reference: https://www.dragonflydb.io/docs/managing-dragonfly/flags
#
# These flags are passed to the Docker container via docker-compose.yml
# Edit this file, then restart: docker compose up -d

# === Cluster ===
--cluster_mode=yes
--admin_port=10001

# === Auth ===
--requirepass=dragonfly

# === TLS ===
--tls
--tls_key_file=/ssl/server.key
--tls_cert_file=/ssl/server.crt
--tls_ca_cert_file=/ssl/ca.crt
--no_tls_on_admin_port=true

# === Network ===
--port=6379
--bind=0.0.0.0

# === Memory ===
--cache_mode=true
--maxmemory=0

# === Persistence ===
--dir=/data
--dbfilename=dump-{timestamp}
--snapshot_cron=*/30 * * * *

# === SSD Data Tiering (v1.35+) ===
# Requires Linux kernel >= 5.19 with io_uring
# Offloads large string values (>64 bytes) to NVMe/SSD
# Reduces RAM usage 2x-5x while keeping sub-ms average latency
--tiered_prefix=/tiering/primary-tier
--tiered_offload_threshold=0.4
--tiered_upload_threshold=0.2
