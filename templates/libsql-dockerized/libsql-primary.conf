# libSQL Primary configuration (libsql-dockerized)
# Reference: Flags passed to sqld in docker-compose.yml

# === Node type ===
# SQLD_NODE=primary

# === Database path ===
# SQLD_DB_PATH=/data/libsql.db

# === Listen addresses ===
# HTTP:  SQLD_HTTP_LISTEN_ADDR=0.0.0.0:8080
# gRPC: SQLD_GRPC_LISTEN_ADDR=0.0.0.0:5001

# === TLS for gRPC (primary -> replica communication) ===
# --grpc-tls
# --grpc-ca-cert-file=/tls/ca_cert.pem
# --grpc-cert-file=/tls/server_cert.pem
# --grpc-key-file=/tls/server_key.pem

# === WAL snapshots ===
# --snapshot-exec=/snapshot.sh
# --max-log-duration=30

# === Client authentication (optional) ===
# --auth-jwt-key-file=/etc/tls/jwt_key.pem
