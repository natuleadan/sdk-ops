global
  daemon
  maxconn 4096

defaults
  mode http
  timeout connect 5s
  timeout client 30s
  timeout server 30s

frontend libsql-in
  bind *:8443 ssl crt /tls/server.pem
  default_backend sqld-cluster

backend sqld-cluster
  balance roundrobin
  option httpchk GET /health
  server primary sqld-primary:8080 check inter 5s rise 2 fall 3
  server replica-1 sqld-replica:8080 check inter 5s rise 2 fall 3
  server replica-2 sqld-replica-2:8080 check inter 5s rise 2 fall 3
