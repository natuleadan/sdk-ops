name: libsql-dockerized
services:
  sqld-primary:
    build: .
    image: libsql-dockerized:latest
    command:
      - sqld
      - --http-listen-addr=0.0.0.0:8080
      - --grpc-listen-addr=0.0.0.0:5001
      - --snapshot-exec=/snapshot.sh
      - --max-log-duration=30
    ports:
      - "${LIBSQL_HTTP:-8080}:8080"
    volumes:
      - primary_data:/var/lib/sqld
      - ./backups:/backups
      - ./tls:/tls:ro
    environment:
      SQLD_NODE: primary
    restart: unless-stopped
    networks:
      - default

  sqld-replica:
    build: .
    image: libsql-dockerized:latest
    command:
      - sqld
      - --http-listen-addr=0.0.0.0:8080
      - --primary-grpc-url=http://sqld-primary:5001
    depends_on:
      sqld-primary:
        condition: service_started
    ports:
      - "${LIBSQL_REPLICA_HTTP:-8081}:8080"
    volumes:
      - replica_data:/var/lib/sqld
      - ./tls:/tls:ro
    environment:
      SQLD_NODE: replica
    restart: unless-stopped
    networks:
      - default

  sqld-replica-2:
    build: .
    image: libsql-dockerized:latest
    command:
      - sqld
      - --http-listen-addr=0.0.0.0:8080
      - --primary-grpc-url=http://sqld-primary:5001
    depends_on:
      sqld-primary:
        condition: service_started
    ports:
      - "${LIBSQL_REPLICA2_HTTP:-8082}:8080"
    volumes:
      - replica2_data:/var/lib/sqld
      - ./tls:/tls:ro
    environment:
      SQLD_NODE: replica
    restart: unless-stopped
    networks:
      - default

  haproxy:
    image: haproxy:3.1-alpine
    ports:
      - "${LIBSQL_HTTP_TLS:-8443}:8443"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./tls:/tls:ro
    depends_on:
      sqld-primary:
        condition: service_started
      sqld-replica:
        condition: service_started
      sqld-replica-2:
        condition: service_started
    restart: unless-stopped
    networks:
      - default

  minio:
    image: minio/minio:latest
    profiles:
      - s3
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - minio_data:/data
    networks:
      - default

  createbucket:
    image: minio/mc:latest
    profiles:
      - s3
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${S3_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-libsql-backups}
    entrypoint: >
      sh -c "
      mc alias set s3 http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb s3/$${S3_BUCKET} --ignore-existing
      "
    networks:
      - default

volumes:
  primary_data:
  replica_data:
  replica2_data:
  minio_data:
