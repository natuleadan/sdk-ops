name: pg-dockerized
description: PostgreSQL 18 + PgDog + SSL + pgbackrest (WAL archiving, full/incr/diff backups, PITR)
services:
  - postgres 18 (database, WAL archiving, SSL)
  - pgdog (transaction pooler, read/write split, session_control_and_locks)
  - pgbackrest (backup/restore, local or S3 storage via MinIO)
  - minio (optional S3-compatible storage via --profile s3)
ports:
  - "6432:6432"  # PgDog (app-facing, transaction mode)
  - "5432:5432"  # PostgreSQL (direct, SSL required)
env:
  PG_USER: dev
  PG_PASSWORD: devpass
  PG_DATABASE: postgres
  PGDOG_POOL_SIZE: "20"
health:
  path: /
  interval: 15
commands:
  init: bash init.sh
  backup: bash backup.sh
  restore: bash restore.sh [-y|--yes]
  validate: bash validate.sh
