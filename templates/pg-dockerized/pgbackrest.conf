[pgbackrest]
compress-type=zst
compress-level=3
process-max=2
start-fast=y
buffer-path=/tmp

[main]
pg1-path=/var/lib/postgresql/18/docker
pg1-port=5432
pg1-user=dev

# Local repo — set via init.sh for S3 storage
repo1-path=/var/lib/pgbackrest
repo1-retention-full=2
repo1-retention-diff=4
repo1-cipher-type=none
repo1-bundle=y
repo1-block=y

[global]
spool-path=/var/spool/pgbackrest

[global:archive-push]
compress-level=1

[global:archive-get]
compress-level=1
