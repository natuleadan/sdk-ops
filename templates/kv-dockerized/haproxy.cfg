global
  daemon
  maxconn 4096

defaults
  mode tcp
  timeout connect 5s
  timeout client 30s
  timeout server 30s

frontend redis-in
  bind *:6379 ssl crt /ssl/server.pem ca-ignore-err all
  default_backend redis-cluster

backend redis-cluster
  balance roundrobin
  option tcp-check
  server primary dragonfly-primary:6379 check inter 5s rise 2 fall 3
  server replica-1 dragonfly-replica:6380 check inter 5s rise 2 fall 3
  server replica-2 dragonfly-replica-2:6381 check inter 5s rise 2 fall 3
